<!DOCTYPE html>
<html>
  
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" id="favicon">
  <link rel="stylesheet" href="style.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<div id="loader" style="display:none;">
  <div class="modern-loader"></div>
  <div class="loader-text" id="loaderText">
    Завантаження даних...
  </div>
</div>

<div id="error" style="
  display:none;
  padding:40px;
  text-align:center;
  font-family:Arial;
">
  <h2 id="errorTitle"></h2>
  <div id="errorText" style="
    margin-top:10px;
    color:#666;
    font-size:14px;
  "></div>
</div>

<button id="scrollTopBtn" class="scroll-top">↑</button>

<div id="loginPage" style="
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#f5f5f5;
">

  <div style="
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
    text-align:center;
    width:90%;
    max-width:300px;
  ">

    <div style="font-size:14px; color:#666; margin-bottom:15px;">
      Увійдіть для продовження
    </div>

    <div id="g_id_onload"
         data-client_id="758097653129-i5cda00k5b73uudvmmalj2jdvk70t5jr.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false"
         data-ux_mode="popup">
    </div>
    
    <div style="display:flex;
      justify-content:center;
      padding:8px;
      border-radius:999px;
      background:#fafafa;
    ">
      <div class="g_id_signin"
           data-type="standard"
           data-size="large"
           data-theme="outline"
           data-shape="pill"
           data-text="continue_with"
           data-width="250">
      </div>
    </div>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="app-shell">

<div id="dashboard" style="padding:10px;">
  <div class="dashboard-title"></div>

  <div class="dashboard-row">

    <!-- 1. ГРАФІК -->
    <div class="dashboard-item">
      <div class="dash-card" style="text-align:center;">
        
        <div id="chart" style="
          width:120px;
          height:120px;
          border-radius:50%;
          position:relative;
          margin:0 auto;
        ">
          <div id="chart-center" style="
            position:absolute;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            text-align:center;
            font-size:12px;
            font-weight:bold;
          ">
            <div id="total-count">0</div>
            <div style="font-size:10px; font-weight:normal;">
              <span style="color:green;" id="shps-count"></span> /
              <span style="color:orange;" id="rozp-count"></span>
            </div>
          </div>
        </div>

        <div style="
            margin-top:6px;
            font-size:12px;
            color:#555;
            display:flex;
            flex-direction:column;
            gap:0;
            align-items:center;
          ">
          <span style="color:green;">● <span id="label-A1"></span></span>
          <span style="color:orange;">● <span id="label-B2"></span></span>
        </div>
      </div>
    </div>

    <!-- 2. MARKS -->
    <div class="dashboard-item">
      <div class="dash-card">
        <div id="marksChart" style="width:100%; margin:0 auto;"></div>
      </div>
    </div>

    <!-- 3. ДН -->
    <div class="dashboard-item">
      <div id="birthdaysBlock"></div>
    </div>
  </div>
</div>

<div class="search-wrapper">
  <input type="text" id="search" placeholder="Пошук...">
  <span id="clearSearch">✖</span>
</div>

<div id="searchCount"></div>

<div id="list"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
