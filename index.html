<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>

#loader {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 99999;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid #ddd;
  border-top: 4px solid #2c3e50;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

.loader-text {
  margin-top: 12px;
  font-size: 14px;
  color: #555;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

html {
  width: 100vw;
  -webkit-text-size-adjust: 100%;
}

body { 
  font-family: Arial; 
  margin:0; 
  background:#f5f5f5;
}

html, body {
  max-width: 100%;
  overflow-x: hidden;
}

.details {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease;
  font-size: 13px;
  line-height: 1.5; 
  color: #333;
  margin-top: 6px;
}

.search-wrapper {
  position: relative;
  padding: 10px;
}

#search {
  width: 100%;
  padding: 10px 35px 10px 10px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ddd;
  box-sizing: border-box;
}

#clearSearch {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  cursor: pointer;
  color: #888;
  display: none;
}

#clearSearch:hover {
  color: #000;
}

.details.open {
  max-height: 1000px;
}

.detail-row {
  padding: 5px 0;
  border-bottom: 1px solid #eee;
}

.detail-key {
  font-weight: 600;
  display: block;
}

.detail-value {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 4px;
}

.copy-btn {
  opacity: 0.6;
}

.copy-btn:hover {
  opacity: 1;
}

.header {
  padding:10px;
  background:#2c3e50;
  color:white;
  text-align:center;
}

.search { padding:10px; }

input {
  width:100%;
  padding:10px;
  font-size:16px;
  border-radius:8px;
  border:1px solid #ddd;
  box-sizing: border-box;
}

.card {
 background:white;
 margin:8px 10px;
 padding:12px;
 border-radius:10px;
 box-shadow:0 2px 5px rgba(0,0,0,0.1);
 width: calc(100% - 20px);
 box-sizing: border-box;
 position: relative;
}

.card div {
  margin:2px 0;
}

.card-label {
  position: static;
  top: 8px;
  right: 10px;
  background: #ecf0f1;
  color: #2c3e50;
  font-size: 11px;
  padding: 3px 6px;
  border-radius: 6px;
  max-width: 70%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.card-label.szch {
  background: #e74c3c;
}

.card-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
}

.scroll-top {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: rgba(44, 62, 80, 0.7);
  color: white;
  border: none;
  font-size: 20px;
  display: none;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 9999;
  backdrop-filter: blur(4px);
}

.scroll-top:hover {
  background: rgba(44, 62, 80, 0.9);
}

#list {
  width: 100%;
}

.name { font-size:17px; font-weight:bold; margin-bottom:2px; flex: 1; word-break: break-word;}

.status { margin-top:5px; font-weight:bold; }
.status[data-status="A1"] { color:green; }
.status[data-status="B2"] { color:orange; }
.status[data-status="C3"] { color:#ff6b6b; }

button {
  margin-top:6px;
  padding:6px 8px;
  font-size:13px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.button-group {
  display:flex;
  gap:8px;
}

.toggle-btn {
  background:#ecf0f1;
  color:#2c3e50;
}

.copy-all-btn {
  background:#2ecc71;
  color:white;
}

/* тестовий дашборд */
.dash-card {
  background: white;
  padding: 10px 14px;
  border-radius: 8px;
  box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  font-weight: bold;
}

.g_id_signin {
  transition: all 0.2s ease;
}

.g_id_signin:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

#chart {
  margin: 0 auto;
}

#chart::after {
  content:'';
  position:absolute;
  width:70px;
  height:70px;
  background:#f5f5f5;
  border-radius:50%;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  z-index:1;
}

#chart-center {
  z-index:2;
  color:#2c3e50;
}

#dashboard {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.dashboard-row {
  display: flex;
  gap: 10px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.dashboard-item {
  flex: 1 1 0;
  min-width: 0;
}

@media (max-width: 768px) {
  .dashboard-row {
    flex-direction: row;
    flex-wrap: wrap;
  }

  .dashboard-item {
    flex: 1 1 calc(50% - 5px);
  }

  .dashboard-item:nth-child(3) {
    flex: 1 1 100%;
  }
}

@media (min-width: 769px) {
  .dashboard-row {
    gap: 20px;
    padding: 0 10px;
  }

  .dashboard-item:nth-child(1) {
    flex: 1 1 0;
  }

  .dashboard-item:nth-child(2) {
    flex: 1.5 1 0;
  }

  .dashboard-item:nth-child(3) {
    flex: 2 1 0;
  }

  #birthdaysBlock .dash-card {
    max-height: 320px;
    display: flex;
    flex-direction: column;
  }

  .bd-content {
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
  }
}

.bd-header {
  cursor: pointer;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.bd-right {
  display: flex;
  align-items: center;
  gap: 6px;
}

.bd-arrow {
  font-size: 12px;
  transition: transform 0.2s ease;
}

.bd-content {
  max-height: 0;
  overflow-x: hidden;
  overflow-y: hidden;
  transition: max-height 0.3s ease;
  font-size: 13px;
  line-height: 1.4;
  text-align: left;
}

.bd-name {
  font-weight: normal;
  color: #333;
  margin-left: 6px;
  margin-bottom: 2px;
}

.bd-date {
  font-weight: 600;
  font-size: 13px;
  margin: 8px 0 4px;
  padding-bottom: 2px;
  border-bottom: 1px solid #eee;
}

.bd-content::-webkit-scrollbar {
  width: 6px;
}

.bd-content::-webkit-scrollbar-thumb {
  background: #ccc;
  border-radius: 4px;
}

</style>
</head>

<script>
let MARKS = [];

function updateDashboard(items) {
  const shps = items.filter(i => i.status === 'A1').length;
  const rozp = items.filter(i => i.status === 'B2').length;

  const total = shps + rozp;

  const shpsPercent = total ? (shps / total) * 100 : 0;

  const chart = document.getElementById('chart');

  chart.style.background = `
    conic-gradient(
      green 0% ${shpsPercent}%,
      orange ${shpsPercent}% 100%
    )
  `;

  document.getElementById('total-count').innerText = total;
  document.getElementById('shps-count').innerText = shps;
  document.getElementById('rozp-count').innerText = rozp;
}

function groupBirthdays(items) {
  const map = {};

  items.forEach(i => {
    if (!map[i.date]) {
      map[i.date] = [];
    }
    map[i.date].push(i);
  });

  return map;
}

function handleCredentialResponse(response) {
  if (!response?.credential) {
    console.error('No token');
    return;
  }

  document.getElementById('loader').style.display = 'flex';

  loadData(response.credential);
}

function getCardLabel(item) {
  const raw =
    item?.all?.['f11'] ||
    item?.all?.['статус'];

  if (!raw) return '';

  const str = String(raw).trim();

  const maxLen = 10;

  const text = str.length > maxLen
    ? str.slice(0, maxLen) + '...'
    : str;

  return {
    text,
    isSZCH: str.toLowerCase().includes('сзч')
  };
}

function updateMarksChart(items) {
  const target = MARKS.map(m => m.key);

  const counts = Object.fromEntries(
    target.map(t => [t, 0])
  );

  items.forEach(item => {
    const raw = item.all?.['f11'];
    const val = typeof raw === 'string' ? raw.toLowerCase() : '';

    target.forEach(t => {
      if (val.includes(t)) {
        counts[t]++;
      }
    });
  });

  renderMarksChart(counts);
}

function renderMarksChart(counts) {
  const container = document.getElementById('marksChart');

  const max = Math.max(...Object.values(counts), 1);

  const MARKS_MAP = Object.fromEntries(
    MARKS.map(m => [m.key, m.label])
  );

  container.innerHTML = Object.entries(counts)
    .map(([key, val]) => {
      const percent = (val / max) * 100;

      const label = MARKS_MAP[key] || key;

      return `
        <div style="margin-bottom:6px;">
          <div style="font-size:12px;">${label} (${val})</div>
          <div style="
            height:8px;
            background:#eee;
            border-radius:4px;
            overflow:hidden;
          ">
            <div style="
              width:${percent}%;
              height:100%;
              background:#3498db;
            "></div>
          </div>
        </div>
      `;
    })
    .join('');
}

function renderBirthdays(items) {
  const container = document.getElementById('birthdaysBlock');

  if (!items || !items.length) {
    container.innerHTML = '';
    return;
  }

  const today = items.filter(i => i.isToday);
  const other = items.filter(i => !i.isToday);

  const todayHTML = today.length ? `
    <div style="
      margin-bottom:10px;
      background:#fff3e0;
      padding:8px 10px;
      border-radius:6px;
    ">
      <div style="font-weight:bold; color:#e67e22;">
        🎂 Сьогодні (${today.length})
      </div>
      ${today.slice(0, 5).map(p => `
        <div style="color:#e67e22; margin-left:6px;">
          🟠 ${p.pib}
        </div>
      `).join('')}
      
      ${today.length > 5 ? `
        <div style="color:#999; margin-left:6px;">
          + ще ${today.length - 5}
        </div>
      ` : ''}
    </div>
  ` : `
    <div style="
      margin-bottom:10px;
      background:#f8f9fa;
      padding:8px 10px;
      border-radius:6px;
      color:#777;
    ">
      🎂 Сьогодні  
      <span style="color:#999;">немає 🎉</span>
    </div>
  `;

  const grouped = groupBirthdays(other);

  const dates = Object.keys(grouped)
  .sort((a, b) => {
    const [d1, m1] = a.split('.').map(Number);
    const [d2, m2] = b.split('.').map(Number);
    return m1 !== m2 ? m1 - m2 : d1 - d2;
  });
  
  const rangeTitle = dates.length
    ? `${dates[0]} – ${dates[dates.length - 1]}`
    : '';
  
  const otherHTML = `
    <div style="
      background:#f8f9fa;
      padding:8px 10px;
      border-radius:6px;
      margin-bottom:6px;
    ">
  
      <div onclick="toggleDay(this)" class="bd-header">
        <div class="bd-left">
          📅 ${rangeTitle}
        </div>
  
        <div class="bd-right">
          <span class="bd-count">${other.length}</span>
          <span class="bd-arrow">▼</span>
        </div>
      </div>
  
      <div class="bd-content">
  
        ${dates.map(date => {
          const list = grouped[date];
          return `
            <div style="margin-bottom:6px;">
              <div class="bd-date">
                ${date}
              </div>
              ${list.map(p => `
                <div class="bd-name">
                  ${p.pib}
                </div>
              `).join('')}
            </div>
          `;
        }).join('')}
  
      </div>
  
    </div>
  `;

  container.innerHTML = `
    <div class="dash-card">
      ${todayHTML}
      ${otherHTML}
    </div>
  `;
}

function toggleDay(el) {
  const content = el.nextElementSibling;
  const arrow = el.querySelector('.bd-arrow');

  const isDesktop = window.innerWidth >= 769;

  if (content.style.maxHeight) {
    content.style.maxHeight = null;
    arrow.style.transform = 'rotate(0deg)';
  } else {
    if (isDesktop) {
      content.style.maxHeight = '220px';
    } else {
      content.style.maxHeight = content.scrollHeight + 'px';
    }

    arrow.style.transform = 'rotate(180deg)';
  }
}

function highlightSZCH(text) {
  if (!text) return text;

  return String(text).replace(/(^|[^а-яіїєґa-z])(сзч)(?=[^а-яіїєґa-z]|$)/gi, (match, p1, p2) => {
    return `${p1}<span style="color:red; font-weight:bold;">${p2}</span>`;
  });
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  showToast('Скопійовано');
}

function showToast(message) {
  const el = document.createElement('div');
  el.innerText = message;

  el.style = `
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:10px 16px;
    border-radius:8px;
    font-size:14px;
    opacity:0;
    transition:opacity 0.3s;
    z-index:9999;
  `;

  document.body.appendChild(el);

  setTimeout(() => el.style.opacity = '1', 10);
  setTimeout(() => {
    el.style.opacity = '0';
    setTimeout(() => el.remove(), 300);
  }, 1500);
}
</script>

<script>

let data = [];
let currentData = [];
let visibleCount = 30;
let STATUS_LABELS = {};
let FIELD_LABELS = {};
let FIELD_ORDER = [];

// рендер
function render(items, append = false) {
  const list = document.getElementById('list');

  if (!append) {
    list.innerHTML = '';
  }

  items.forEach((item) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.dataset.index = currentData.indexOf(item);
    const labelData = getCardLabel(item);

    div.innerHTML = `
      <div class="card-header">
        <div class="name">${item.pib}</div>
        ${labelData ? `
          <div class="card-label ${labelData.isSZCH ? 'szch' : ''}">
            ${labelData.text}
          </div>
        ` : ''}
      </div>
    
      <div>${FIELD_LABELS['f12']}: ${item.f12}</div>
      <div>${FIELD_LABELS['f13']}: ${item.f13}</div>
      <div class="status" data-status="${item.status}">
        ${STATUS_LABELS[item.status] || item.status}
      </div>
    
      <div style="display:flex; gap:10px;">
        <button onclick="toggle(this)">Детальніше</button>
        <button class="copy-all-btn" style="display:none;">📋 Копіювати</button>
      </div>
    
      <div class="details"></div>
    `;
    list.appendChild(div);
  });
}

function buildDetailsHTML(item) {
  const data = item.all || {};

  const firstFields = FIELD_ORDER;

  const allKeys = Object.keys(data);

  const ordered = firstFields.filter(k => allKeys.includes(k));
  const rest = allKeys.filter(k => !firstFields.includes(k));

  const finalKeys = [...ordered, ...rest];

  return finalKeys.map(k => {
    const rawValue = data[k];
    let v = highlightSZCH(rawValue);

    if (v === null || v === undefined || v === '') return '';

    // const displayKey = k.replace(/\r?\n/g, ' ');
    const displayKey = (FIELD_LABELS[k] || k).replace(/\r?\n/g, ' ');

    const keyHTML = k === 'ТВО'
      ? `<span class="detail-key" style="color:#2ecc71; font-weight:bold;">${displayKey}</span>`
      : `<span class="detail-key">${displayKey}</span>`;

    return `
      <div class="detail-row">
        ${keyHTML}
        <div class="detail-value">
          <span class="copy-text">${v}</span>
          <button class="copy-btn" data-text="${encodeURIComponent(rawValue)}">
            📋
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function getSearchCount() {
  return document.getElementById('searchCount');
}

function toggle(btn) {
  const card = btn.closest('.card');
  const details = card.querySelector('.details');
  const copyBtn = card.querySelector('.copy-all-btn');

  const index = card.dataset.index;
  const item = currentData[index];

  const isOpen = details.classList.contains('open');

  if (!details.innerHTML) {
    details.innerHTML = buildDetailsHTML(item);
  }

  if (isOpen) {
    details.style.maxHeight = null;
    details.classList.remove('open');
    copyBtn.style.display = 'none';
  } else {
    details.classList.add('open');
    details.style.maxHeight = details.scrollHeight + 'px';
    copyBtn.style.display = 'inline-block';
  }
}

// підгрузка
function loadMore() {
  const next = currentData.slice(visibleCount, visibleCount + 30);
  if (next.length === 0) return;

  render(next, true);
  visibleCount += 30;
}

// скрол
window.addEventListener('scroll', () => {
  if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
    loadMore();
  }
});

// пошук
const searchInput = document.getElementById('search');
const clearBtn = document.getElementById('clearSearch');

searchInput.addEventListener('input', e => {
  const val = e.target.value;

  clearBtn.style.display = val ? 'block' : 'none';

  const lower = val.toLowerCase();

  currentData = data.filter(item =>
    (item.pib + item.f12 + item.f13 + item.status)
      .toLowerCase()
      .includes(lower)
  );

  if (val) {
    const el = getSearchCount();

    if (el) {
      el.style.display = 'block';
      el.innerText = `🔍 Знайдено: ${currentData.length}`;
    }
  } else {
    const el = getSearchCount();
    if (el) el.style.display = 'none';
  }

  visibleCount = 30;
  render(currentData.slice(0, visibleCount));
});

clearBtn.addEventListener('click', () => {
  searchInput.value = '';
  clearBtn.style.display = 'none';

  getSearchCount().style.display = 'none';

  currentData = data;
  visibleCount = 30;
  render(currentData.slice(0, visibleCount));
});

async function loadData(token) {
  try {
    const res = await fetch(`https://script.google.com/macros/s/AKfycbxaGJM3J0JmOBoKe5GwwnKNt4vtuQi5TUn_EVky0KUHlZhq6DoWcIyrc6fQ19JIeElV3w/exec?token=${token}`);
    const result = await res.json();
    STATUS_LABELS = result.meta?.labels || {};
    FIELD_LABELS = result.meta?.fields || {};
    FIELD_ORDER = result.meta?.order || [];
    MARKS = result.meta?.marks || [];

    document.getElementById('label-A1').innerText =
      STATUS_LABELS['A1'] || 'A1';
    
    document.getElementById('label-B2').innerText =
      STATUS_LABELS['B2'] || 'B2';

    if (result.error) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('loginPage').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      return;
    }

    document.querySelector('.header').innerText = `Дані станом на ${result.date}`;
    data = result.data;
    currentData = data;

    document.getElementById('loader').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('loginPage').style.display = 'none';

    render(currentData.slice(0, visibleCount));
    updateDashboard(data);
    updateMarksChart(data);
    renderBirthdays(result.birthdays);

  } catch (e) {
    console.error(e);

    document.getElementById('loader').style.display = 'none';
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  }
}
  
document.addEventListener('click', function(e) {

  // копіювання одного поля
  if (e.target.classList.contains('copy-btn')) {
    const text = decodeURIComponent(e.target.dataset.text);
    copyText(text);
  }

  // копіювання ВСЬОГО блоку
  if (e.target.classList.contains('copy-all-btn')) {
    const wrapper = e.target.parentElement;
    const details = wrapper.nextElementSibling;

    const rows = details.querySelectorAll('.detail-row');

    let text = '';

    rows.forEach(row => {
      const key = row.querySelector('.detail-key')?.innerText || '';
      const value = row.querySelector('.copy-text')?.innerText || '';

      if (value) {
        text += `${key}: ${value}\n`;
      }
    });

    copyText(text.trim());
  }

});

const scrollBtn = document.getElementById('scrollTopBtn');

// показ / ховання кнопки
window.addEventListener('scroll', () => {
  if (window.scrollY > 300) {
    scrollBtn.style.display = 'flex';
  } else {
    scrollBtn.style.display = 'none';
  }
});

scrollBtn.addEventListener('click', () => {
  window.scrollTo({
    top: 0,
    behavior: 'smooth'
  });
});
